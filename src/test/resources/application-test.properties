# Perfil de test: H2 en memoria con schema limpio por test
spring.datasource.url=jdbc:h2:mem:ecommerce-test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# create-drop para que cada @DirtiesContext reconstruya el schema
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT config (necesita valores aunque no se usen en tests)
ecommerce.jwt.secret=ecommerce-jwt-secret-key-2026-para-test
ecommerce.jwt.expiration=86400000

# Evita que Spring Security auto-configure un UserDetailsService en test
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
