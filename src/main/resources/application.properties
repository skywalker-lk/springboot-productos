spring.application.name=ecommerce

# Perfil por defecto: H2 en memoria para desarrollo local
spring.datasource.url=jdbc:h2:mem:ecommerce
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Jackson: permitir que campos faltantes en JSON se mapeen a 0 en primitivos
# (necesario porque el frontend puede enviar datos parciales)
spring.jackson.deserialization.fail-on-null-for-primitives=false

# Para usar PostgreSQL local sin Docker, activá el perfil 'postgres':
#   --spring.profiles.active=postgres
# o creá application-postgres.properties con tu config local

# JWT
# En producción, setear JWT_SECRET como variable de entorno (generar con: openssl rand -base64 64)
# En desarrollo se usa el fallback (NO seguro pero funcional)
ecommerce.jwt.secret=${JWT_SECRET:ecommerce-jwt-secret-key-2026-que-deberia-ser-mas-larga-en-produccion}
ecommerce.jwt.expiration=${JWT_EXPIRATION:86400000}

# UserDetailsService propio en AppConfig — activamos autoconfig
