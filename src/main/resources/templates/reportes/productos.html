<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Reporte de Productos</title>
    <style>
        body { font-family: 'Helvetica', 'Arial', sans-serif; font-size: 12px; color: #333; }
        h1 { text-align: center; color: #2c3e50; font-size: 18px; margin-bottom: 5px; }
        .subtitulo { text-align: center; color: #7f8c8d; font-size: 11px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #2c3e50; color: white; padding: 8px 6px; text-align: left; font-size: 11px; }
        td { padding: 6px; border-bottom: 1px solid #ddd; font-size: 11px; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .derecha { text-align: right; }
        .footer { text-align: center; color: #95a5a6; font-size: 10px; margin-top: 20px; }
        .resumen { margin-bottom: 20px; padding: 10px; background-color: #ecf0f1; border-radius: 4px; font-size: 11px; }
        .resumen strong { color: #2c3e50; }
    </style>
</head>
<body>
    <h1>Reporte de Productos</h1>
    <p class="subtitulo" th:text="|Generado el ${#dates.format(#dates.createNow(), 'dd/MM/yyyy HH:mm')}|">Fecha</p>

    <div class="resumen">
        <strong>Total de productos:</strong> <span th:text="${productos.size()}">0</span> |
        <strong>Valorización total:</strong> $<span th:text="${#numbers.formatDecimal(valorizacion, 0, 2)}">0.00</span>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th class="derecha">Precio</th>
                <th class="derecha">Stock</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${productos}">
                <td th:text="${p.id}">1</td>
                <td th:text="${p.nombre}">Producto</td>
                <td th:text="${p.categoria}">Categoría</td>
                <td class="derecha" th:text="|$${#numbers.formatDecimal(p.precio, 0, 2)}|">$0.00</td>
                <td class="derecha" th:text="${p.stock}">0</td>
            </tr>
        </tbody>
    </table>

    <p class="footer">E-Commerce API - Reporte generado automáticamente</p>
</body>
</html>
